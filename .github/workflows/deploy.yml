name: Deploy to Production

on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: 188.94.155.111
          username: root
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: /root/SolveBridge/scripts/deploy.sh
